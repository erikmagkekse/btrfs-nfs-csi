{{- $existing := lookup "storage.k8s.io/v1" "CSIDriver" "" .Values.driverName }}
{{- if and $existing (ne (index $existing.metadata.labels "app.kubernetes.io/instance") .Release.Name) }}
{{- fail (printf "CSIDriver %q already exists and is managed by a different release" .Values.driverName) }}
{{- end }}
apiVersion: storage.k8s.io/v1
kind: CSIDriver
metadata:
  name: {{ .Values.driverName }}
  labels:
    {{- include "btrfs-nfs-csi.labels" . | nindent 4 }}
spec:
  attachRequired: true
  podInfoOnMount: false
  fsGroupPolicy: File
  volumeLifecycleModes:
    - Persistent
