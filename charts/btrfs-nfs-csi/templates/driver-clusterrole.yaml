{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "btrfs-nfs-csi.driverName" . }}
  labels:
    {{- include "btrfs-nfs-csi.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "patch"]
  {{- if gt (include "btrfs-nfs-csi.healthCheckEnabled" . | int) 0 }}
  - apiGroups: ["storage.k8s.io"]
    resources: ["volumeattachments"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create"]
  {{- end }}
  {{- with .Values.rbac.driverExtraRules }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
{{- end }}
