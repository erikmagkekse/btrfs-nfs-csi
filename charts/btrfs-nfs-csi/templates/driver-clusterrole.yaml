{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "btrfs-nfs-csi.driverName" . }}
  labels:
    {{- include "btrfs-nfs-csi.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "patch"]
  {{- with .Values.rbac.driverExtraRules }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
{{- end }}
